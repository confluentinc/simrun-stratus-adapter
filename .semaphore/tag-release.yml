version: v1.0
name: cut-release-tag
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-2

execution_time_limit:
  minutes: 15

global_job_config:
  prologue:
    commands:
      - checkout

blocks:
  - name: "Cut Release Tag"
    dependencies: []
    task:
      jobs:
        - name: "Compute bump and push tag"
          commands:
            - bash .semaphore/cut-release-tag.sh
